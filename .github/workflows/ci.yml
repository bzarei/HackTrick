name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Setup Node + pnpm cache
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Install dependencies
      - run: pnpm install --frozen-lockfile

      # Run Nx tasks
      - run: pnpm nx run-many -t lint test build typecheck

      # Nx Cloud auto-fix suggestions (optional)
      - run: pnpm nx fix-ci
        if: always()